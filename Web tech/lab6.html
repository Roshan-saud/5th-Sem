<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images and Styling</title>
    <link rel="stylesheet" href="lab6.css">
</head>
<body>

    <h1>My Image Gallery</h1>
    <p>A simple gallery with styled images for demonstration.</p>

    <div class="gallery">
        <div class="image-box">
            <img src="img1.png" alt="Image 1">
            <p>Image 1</p>
        </div>
        <div class="image-box">
            <img src="img2.png" alt="Image 2">
            <p>Image 2</p>
        </div>
        <div class="image-box">
            <img src="img3.png" alt="Image 3">
            <p>Image 3</p>
        </div>
        <div class="image-box">
            <img src="img4.png" alt="Image 4">
            <p>Image 4</p>
        </div>
    </div>

</body>
</html>
